<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 1 · Sessão 2 — Ciclo do Negócio de Cibersegurança</title>
<style>
  :root{
    --azul:#1F4E79; --azul2:#2E74B5; --claro:#DEEBF7; --ok:#2e7d32; --okbg:#e8f5e9;
    --erro:#c62828; --errobg:#fdecea; --cinza:#595959; --borda:#d9d9d9;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{font-family:'Segoe UI',Calibri,system-ui,sans-serif; background:#f4f6f9; color:#222; line-height:1.55; padding:24px 12px}
  .wrap{max-width:760px; margin:0 auto}
  header{background:var(--azul); color:#fff; border-radius:14px 14px 0 0; padding:26px 28px}
  header h1{font-size:1.35rem; font-weight:700}
  header p{opacity:.85; font-size:.95rem; margin-top:6px}
  .card{background:#fff; border:1px solid var(--borda); border-top:none; border-radius:0 0 14px 14px; padding:28px}
  .progress{height:8px; background:#e4e9f0; border-radius:99px; margin-bottom:22px; overflow:hidden}
  .progress > div{height:100%; background:var(--azul2); width:0; transition:width .3s}
  .qnum{font-size:.85rem; color:var(--cinza); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px}
  .qtext{font-size:1.12rem; font-weight:600; margin-bottom:18px}
  .opt{display:block; width:100%; text-align:left; background:#fff; border:1.5px solid var(--borda); border-radius:10px;
       padding:13px 16px; margin-bottom:10px; font-size:1rem; cursor:pointer; transition:all .15s; font-family:inherit}
  .opt:hover:not(:disabled){border-color:var(--azul2); background:var(--claro)}
  .opt:disabled{cursor:default}
  .opt.correta{border-color:var(--ok); background:var(--okbg); font-weight:600}
  .opt.errada{border-color:var(--erro); background:var(--errobg)}
  .letra{display:inline-block; width:1.6em; font-weight:700; color:var(--azul2)}
  .feedback{border-radius:10px; padding:14px 16px; margin-top:14px; font-size:.97rem; display:none}
  .feedback.show{display:block}
  .feedback.ok{background:var(--okbg); border-left:5px solid var(--ok)}
  .feedback.ko{background:var(--errobg); border-left:5px solid var(--erro)}
  .feedback b{display:block; margin-bottom:4px}
  .nav{display:flex; justify-content:flex-end; margin-top:20px}
  button.next{background:var(--azul); color:#fff; border:none; border-radius:10px; padding:12px 26px; font-size:1rem;
       cursor:pointer; font-family:inherit; display:none}
  button.next.show{display:inline-block}
  button.next:hover{background:var(--azul2)}
  .resultado{text-align:center; display:none}
  .resultado.show{display:block}
  .score{font-size:3rem; font-weight:800; color:var(--azul); margin:14px 0 4px}
  .nivel{font-size:1.15rem; font-weight:600; margin-bottom:14px}
  .msg{color:var(--cinza); margin-bottom:22px}
  .rev{text-align:left; border-top:1px solid var(--borda); padding-top:18px; margin-top:8px}
  .rev h3{font-size:1rem; color:var(--azul); margin-bottom:10px}
  .rev-item{font-size:.92rem; margin-bottom:8px; padding-left:22px; position:relative}
  .rev-item::before{content:attr(data-i); position:absolute; left:0; font-weight:700; color:var(--azul2)}
  .rev-item.certa::after{content:" ✓"; color:var(--ok); font-weight:700}
  .rev-item.errada2::after{content:" ✗"; color:var(--erro); font-weight:700}
  button.retry{background:#fff; color:var(--azul); border:1.5px solid var(--azul); border-radius:10px;
       padding:12px 26px; font-size:1rem; cursor:pointer; font-family:inherit; margin-top:18px}
  button.retry:hover{background:var(--claro)}
  footer{text-align:center; color:var(--cinza); font-size:.82rem; margin-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Quiz 1 · Sessão 2</h1>
    <p>QNRCS, níveis de medidas mínimas, certificação e controlos-chave (1.ª parte da sessão) · 9 perguntas · anónimo</p>
  </header>
  <div class="card">
    <div class="progress"><div id="bar"></div></div>
    <div id="quiz"></div>
    <div class="nav"><button class="next" id="btnNext" onclick="proxima()">Próxima pergunta →</button></div>
    <div class="resultado" id="res">
      <div class="qnum">Resultado final</div>
      <div class="score" id="scoreTxt"></div>
      <div class="nivel" id="nivelTxt"></div>
      <div class="msg" id="msgTxt"></div>
      <div class="rev" id="revisao"></div>
      <button class="retry" onclick="reiniciar()">↻ Repetir o quiz</button>
    </div>
  </div>
  <footer>Ciclo do Negócio de Cibersegurança · Formador: Nuno Salvador</footer>
</div>

<script>
const QUESTOES = [
 {
  q:"O que é o QNRCS?",
  opts:["Uma certificação internacional emitida pela ENISA","O instrumento nacional de referência para normas e boas práticas de cibersegurança, previsto no Regime Jurídico da Cibersegurança e atualizado pelo CNCS de 5 em 5 anos","Um software de gestão de incidentes do Estado","A versão portuguesa do RGPD"],
  c:1,
  exp:"Quadro Nacional de Referência de Cibersegurança (art. 14.º do RJC): o mapa oficial português para operacionalizar a NIS2, construído com princípios de proporcionalidade e adaptado à maturidade de cada entidade. Quando perguntarem 'por onde começo?', a resposta é: pelo QNRCS."
 },
 {
  q:"Quantos são os objetivos estruturantes do QNRCS, e quais?",
  opts:["Quatro: Prevenir, Proteger, Reagir, Reportar","Seis: Gerir, Identificar, Proteger, Detetar, Responder e Recuperar","Três: Pessoas, Processos, Tecnologia","Cinco: os mesmos do NIST CSF 1.0"],
  c:1,
  exp:"Seis objetivos organizados pelo ciclo de vida da gestão — a mesma família do NIST CSF 2.0 (que acrescentou o Govern). Cada objetivo divide-se em categorias, e estas em controlos baseados em referenciais internacionais."
 },
 {
  q:"Os níveis de medidas mínimas de cibersegurança (Básico, Substancial, Elevado) são…",
  opts:["Alternativos — cada entidade escolhe o que preferir","Cumulativos — o Substancial inclui o Básico; o Elevado inclui os três","Setoriais — um nível por setor de atividade","Temporários — desaparecem após a transição de 24 meses"],
  c:1,
  exp:"São cumulativos: 19 controlos no Básico, +31 no Substancial (acumulado 50), +29 no Elevado (acumulado 79). Memoriza a régua 19-50-79 — é a linguagem da conversa com auditores e tutela."
 },
 {
  q:"Qual destas medidas pertence ao nível BÁSICO (a fundação obrigatória)?",
  opts:["SOC 24/7 com threat hunting","Zero Trust e PAM","MFA, inventários, backups, firewalls e plano de resposta a incidentes","Avaliação do risco das comunicações entre sistemas críticos"],
  c:2,
  exp:"O Básico é a fundação: inventários, gestão de identidades, MFA, firewalls, cópias de segurança, resposta a incidentes e sensibilização. SOC 24/7, Zero Trust e PAM são do nível Elevado; a avaliação de comunicações críticas também. Pergunta incómoda e útil: a tua organização cumpre o Básico completo?"
 },
 {
  q:"Sobre a certificação como presunção de cumprimento (art. 27.º): qual é a armadilha clássica da ISO 27001?",
  opts:["A ISO 27001 não é aceite em Portugal","O certificado pode ter um ÂMBITO reduzido que não cobre os serviços relevantes da entidade","A ISO 27001 só se aplica a empresas tecnológicas","A certificação é obrigatória para todas as entidades"],
  c:1,
  exp:"A presunção de cumprimento só vale para o que o âmbito do certificado cobre. Um certificado com scope 'datacenter' não presume cumprimento para a organização inteira — em auditoria, isso cai em 30 segundos. Verificar o âmbito é o primeiro gesto de quem avalia um certificado (também dos fornecedores!)."
 },
 {
  q:"O artigo 32.º do regime português exige que as entidades mantenham e comuniquem…",
  opts:["A lista de colaboradores com formação em cibersegurança","A lista de ativos publicamente acessíveis via Internet (serviço, versão, IP, FQDN, dependências)","O relatório anual de contas","A lista de incidentes dos últimos 5 anos"],
  c:1,
  exp:"O Estado quer saber o que tens exposto à Internet — com prazo inicial de 20 dias úteis após notificação. É o inventário da tua superfície de ataque externa. Quem nunca o fez costuma ter surpresas na primeira passagem."
 },
 {
  q:"O controlo de 'dupla validação' serve para…",
  opts:["Ter dois antivírus em cada máquina","Exigir confirmação por um segundo canal (ex.: telefonema para o número oficial) em transferências financeiras ou alterações de dados sensíveis","Fazer backup em dois suportes diferentes","Pedir duas passwords no login"],
  c:1,
  exp:"O pedido de mudança de IBAN que chega por email confirma-se por telefone para o número OFICIAL de contacto. É um controlo organizacional simples que teria travado grande parte das 'fraudes de CEO' — incluindo as novas, com deepfakes de voz e vídeo."
 },
 {
  q:"Qual é o princípio fundamental da NIS2 na definição das medidas de cibersegurança? (o quiz da sala)",
  opts:["Implementar todas as medidas possíveis, independentemente do contexto","Aplicar controlos apenas após incidentes","Adotar uma abordagem baseada no risco e proporcional à criticidade da organização","Seguir apenas normas internacionais voluntárias"],
  c:2,
  exp:"Medidas APROPRIADAS aos riscos — considerando exposição, dimensão, probabilidade/gravidade e impacto social e económico. O que a lei pune não é ser pequeno; é não conseguir explicar o racional de risco das escolhas feitas."
 },
 {
  q:"Qual é o impacto de uma cultura organizacional fraca em cibersegurança, no contexto da NIS2? (o quiz da sala)",
  opts:["Não tem impacto se existirem boas ferramentas","Pode comprometer a eficácia dos controlos e aumentar o risco de incidentes","Afeta apenas a equipa de IT","Só é relevante após um incidente"],
  c:1,
  exp:"A cultura é o sistema operativo dos controlos: o MFA não protege quem aprova exceções a torto e a direito. O QNRCS considera o fator humano em todos os objetivos — e a NIS2 exige formação até para os órgãos de gestão."
 }
];

let i = 0, certas = 0, respostas = [];
const $ = id => document.getElementById(id);

function render(){
  $('bar').style.width = (i / QUESTOES.length * 100) + '%';
  const Q = QUESTOES[i];
  let h = `<div class="qnum">Pergunta ${i+1} de ${QUESTOES.length}</div>`;
  h += `<div class="qtext">${Q.q}</div>`;
  Q.opts.forEach((o, k) => {
    h += `<button class="opt" onclick="responder(${k})"><span class="letra">${'abcd'[k]})</span>${o}</button>`;
  });
  h += `<div class="feedback" id="fb"></div>`;
  $('quiz').innerHTML = h;
  $('btnNext').classList.remove('show');
  $('btnNext').textContent = (i === QUESTOES.length - 1) ? 'Ver resultado →' : 'Próxima pergunta →';
}

function responder(k){
  const Q = QUESTOES[i];
  const botoes = document.querySelectorAll('.opt');
  botoes.forEach(b => b.disabled = true);
  botoes[Q.c].classList.add('correta');
  const ok = (k === Q.c);
  if(ok){ certas++; } else { botoes[k].classList.add('errada'); }
  respostas.push(ok);
  const fb = $('fb');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'ko');
  fb.innerHTML = `<b>${ok ? '✓ Correto!' : '✗ Não é essa.'}</b>${Q.exp}`;
  $('btnNext').classList.add('show');
}

function proxima(){
  i++;
  if(i < QUESTOES.length){ render(); }
  else { resultado(); }
}

function resultado(){
  $('bar').style.width = '100%';
  $('quiz').innerHTML = '';
  $('btnNext').classList.remove('show');
  const pct = Math.round(certas / QUESTOES.length * 100);
  $('scoreTxt').textContent = `${certas}/${QUESTOES.length}`;
  let nivel, msg;
  if(pct >= 90){ nivel = '🏆 Nível: pronto para o board'; msg = 'Excelente. Dominas as mensagens do Módulo 1 — na próxima sessão, desafia o formador.'; }
  else if(pct >= 70){ nivel = '👍 Nível: CISO em construção'; msg = 'Muito bom. Revê as explicações das perguntas falhadas — normalmente são as armadilhas entre "técnico" e "negócio".'; }
  else if(pct >= 50){ nivel = '📈 Nível: no bom caminho'; msg = 'Estás a meio da viagem. Sugestão: relê a cábula da matriz de McFarlan e a grelha das 6 perguntas da NIS2.'; }
  else { nivel = '🌱 Nível: ponto de partida'; msg = 'Sem stress — é exatamente para isto que serve a formação. Volta a este quiz depois da Sessão 2 e compara.'; }
  $('nivelTxt').textContent = nivel;
  $('msgTxt').textContent = msg;
  let rev = '<h3>Revisão rápida</h3>';
  QUESTOES.forEach((Q, k) => {
    rev += `<div class="rev-item ${respostas[k] ? 'certa' : 'errada2'}" data-i="${k+1}.">${Q.q.substring(0, 90)}${Q.q.length > 90 ? '…' : ''}</div>`;
  });
  $('revisao').innerHTML = rev;
  $('res').classList.add('show');
}

function reiniciar(){
  i = 0; certas = 0; respostas = [];
  $('res').classList.remove('show');
  render();
}

render();
</script>
</body>
</html>
