<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 2 · Módulo 2 — Ciclo do Negócio de Cibersegurança</title>
<style>
  :root{
    --azul:#1F4E79; --azul2:#2E74B5; --claro:#DEEBF7; --ok:#2e7d32; --okbg:#e8f5e9;
    --erro:#c62828; --errobg:#fdecea; --cinza:#595959; --borda:#d9d9d9;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{font-family:'Segoe UI',Calibri,system-ui,sans-serif; background:#f4f6f9; color:#222; line-height:1.55; padding:24px 12px}
  .wrap{max-width:760px; margin:0 auto}
  header{background:var(--azul); color:#fff; border-radius:14px 14px 0 0; padding:26px 28px}
  header h1{font-size:1.35rem; font-weight:700}
  header p{opacity:.85; font-size:.95rem; margin-top:6px}
  .card{background:#fff; border:1px solid var(--borda); border-top:none; border-radius:0 0 14px 14px; padding:28px}
  .progress{height:8px; background:#e4e9f0; border-radius:99px; margin-bottom:22px; overflow:hidden}
  .progress > div{height:100%; background:var(--azul2); width:0; transition:width .3s}
  .qnum{font-size:.85rem; color:var(--cinza); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px}
  .qtext{font-size:1.12rem; font-weight:600; margin-bottom:18px}
  .opt{display:block; width:100%; text-align:left; background:#fff; border:1.5px solid var(--borda); border-radius:10px;
       padding:13px 16px; margin-bottom:10px; font-size:1rem; cursor:pointer; transition:all .15s; font-family:inherit}
  .opt:hover:not(:disabled){border-color:var(--azul2); background:var(--claro)}
  .opt:disabled{cursor:default}
  .opt.correta{border-color:var(--ok); background:var(--okbg); font-weight:600}
  .opt.errada{border-color:var(--erro); background:var(--errobg)}
  .letra{display:inline-block; width:1.6em; font-weight:700; color:var(--azul2)}
  .feedback{border-radius:10px; padding:14px 16px; margin-top:14px; font-size:.97rem; display:none}
  .feedback.show{display:block}
  .feedback.ok{background:var(--okbg); border-left:5px solid var(--ok)}
  .feedback.ko{background:var(--errobg); border-left:5px solid var(--erro)}
  .feedback b{display:block; margin-bottom:4px}
  .nav{display:flex; justify-content:flex-end; margin-top:20px}
  button.next{background:var(--azul); color:#fff; border:none; border-radius:10px; padding:12px 26px; font-size:1rem;
       cursor:pointer; font-family:inherit; display:none}
  button.next.show{display:inline-block}
  button.next:hover{background:var(--azul2)}
  .resultado{text-align:center; display:none}
  .resultado.show{display:block}
  .score{font-size:3rem; font-weight:800; color:var(--azul); margin:14px 0 4px}
  .nivel{font-size:1.15rem; font-weight:600; margin-bottom:14px}
  .msg{color:var(--cinza); margin-bottom:22px}
  .rev{text-align:left; border-top:1px solid var(--borda); padding-top:18px; margin-top:8px}
  .rev h3{font-size:1rem; color:var(--azul); margin-bottom:10px}
  .rev-item{font-size:.92rem; margin-bottom:8px; padding-left:22px; position:relative}
  .rev-item::before{content:attr(data-i); position:absolute; left:0; font-weight:700; color:var(--azul2)}
  .rev-item.certa::after{content:" ✓"; color:var(--ok); font-weight:700}
  .rev-item.errada2::after{content:" ✗"; color:var(--erro); font-weight:700}
  button.retry{background:#fff; color:var(--azul); border:1.5px solid var(--azul); border-radius:10px;
       padding:12px 26px; font-size:1rem; cursor:pointer; font-family:inherit; margin-top:18px}
  button.retry:hover{background:var(--claro)}
  footer{text-align:center; color:var(--cinza); font-size:.82rem; margin-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Quiz 2 · Módulo 2</h1>
    <p>Mapping de controlos, Security by Design, auditoria e cadeia de fornecimento (2.ª parte) · 8 perguntas · anónimo</p>
  </header>
  <div class="card">
    <div class="progress"><div id="bar"></div></div>
    <div id="quiz"></div>
    <div class="nav"><button class="next" id="btnNext" onclick="proxima()">Próxima pergunta →</button></div>
    <div class="resultado" id="res">
      <div class="qnum">Resultado final</div>
      <div class="score" id="scoreTxt"></div>
      <div class="nivel" id="nivelTxt"></div>
      <div class="msg" id="msgTxt"></div>
      <div class="rev" id="revisao"></div>
      <button class="retry" onclick="reiniciar()">↻ Repetir o quiz</button>
    </div>
  </div>
  <footer>Ciclo do Negócio de Cibersegurança · Formador: Nuno Salvador</footer>
</div>

<script>
const QUESTOES = [
 {
  "q": "Qual é a lógica do 'mapping de controlos' que estrutura a resposta a um auditor?",
  "opts": [
   "Para cada tema NIS2: que evidência o prova e que referencial dá a receita",
   "Memorizar os artigos da diretiva e do decreto-lei de transposição",
   "Instalar o conjunto de ferramentas recomendado pelas guidelines da ENISA",
   "Contratar um consultor certificado para responder às questões do auditor"
  ],
  "c": 0,
  "exp": "Requisito → evidência → norma. Exemplo: Modelo de Governo → nomeações formais + matriz RACI → ISO 27001 5.1/5.3 + ENISA 1.2. Quem domina o mapping domina a auditoria antes de ela começar."
 },
 {
  "q": "No mapping do risco de terceiros (3rd party), qual é a evidência aparentemente trivial que a maioria das organizações NÃO tem em condições?",
  "opts": [
   "A política de passwords e a sua aplicação em todos os sistemas, como por vezes se assume erradamente",
   "O contrato com o fornecedor de eletricidade e serviços básicos",
   "O organograma da empresa com as responsabilidades de segurança",
   "O diretório único e atualizado de fornecedores e prestadores de serviços"
  ],
  "c": 3,
  "exp": "A ENISA pede um registo de fornecedores com pontos de contacto, serviços prestados e classificação por criticidade, revisto pelo menos anualmente. Parece simples — e é a evidência que falha em 8 de cada 10 organizações. Sem lista, não há gestão."
 },
 {
  "q": "'Secure by Default' significa que…",
  "opts": [
   "A segurança ativa-se quando o utilizador o decidir nas definições",
   "Só se adquirem produtos e serviços com certificação de segurança",
   "A configuração segura é o ponto de partida; as exceções documentam-se",
   "O sistema bloqueia tudo por defeito, mesmo comprometendo o trabalho"
  ],
  "c": 2,
  "exp": "Inverter o ónus da prova: a pergunta não é 'porquê fechar este porto?' mas 'quem justificou abri-lo, quando, e com que compensação?'. Baselines documentadas + registo de exceções = metade do caminho do security by design."
 },
 {
  "q": "O que é uma SBoM e porque interessa à NIS2?",
  "opts": [
   "A 'lista de ingredientes' do software: os componentes que o compõem",
   "Um tipo de firewall aplicacional para proteger serviços expostos na web",
   "Um relatório financeiro sobre o custo total de propriedade do software",
   "Uma equipa dedicada de resposta a incidentes de segurança aplicacional"
  ],
  "c": 0,
  "exp": "Software Bill of Materials. Quando rebentou o Log4Shell, quem tinha SBoM respondeu 'estamos expostos aqui e aqui' em horas; quem não tinha passou semanas às cegas. A gestão de dependências é requisito explícito do desenvolvimento seguro."
 },
 {
  "q": "Porque é que os prazos de notificação de incidentes (a começar nas 24h para a notificação inicial) são, na prática, um requisito TÉCNICO?",
  "opts": [
   "Porque obrigam à aquisição de um SIEM específico homologado pelo CNCS",
   "Porque a notificação é submetida através de um sistema automático europeu",
   "Não são: constituem um requisito puramente administrativo e documental",
   "Porque não se notifica em 24h o que se demora semanas a detetar"
  ],
  "c": 3,
  "exp": "O relógio legal só se cumpre com deteção a funcionar. E nota o detalhe do regime português (arts. 41.º-44.º do DL 125/2025): notifica-se o incidente SIGNIFICATIVO, e o prazo de 24h conta de quando a entidade CONCLUI que ele existe ou pode vir a existir — com atualização até 72h, notificação do fim do impacto e relatório final em 30 dias úteis depois desta. Sem monitorização, nunca 'concluis' a tempo."
 },
 {
  "q": "Na auditoria pós-NIS2, o auditor percorre o 'ciclo de vida do controlo'. Que quatro perguntas faz?",
  "opts": [
   "Quanto custou? Quem autorizou a compra? Quando foi instalado? A quem foi atribuído?",
   "É certificado? É europeu? Está na cloud? Cumpre os requisitos do regulamento?",
   "Desenhado? Implementado e comunicado? Operado de forma consistente? Revisto?",
   "Existe política? Existe procedimento? Existe registo? Existe evidência de aprovação?"
  ],
  "c": 2,
  "exp": "As quatro perguntas que matam o 'temos uma política' seco. A diferença entre 'temos MFA' e 'o MFA é operado de forma consistente' está nas exceções, contas de serviço e acessos antigos — é nas margens que a auditoria acontece."
 },
 {
  "q": "Segundo o estudo da ISACA sobre a cadeia de abastecimento, qual é a combinação correta?",
  "opts": [
   "1 em 100 sofreu ataques via terceiros; 90% estão confiantes na sua cadeia",
   "1 em 4 já sofreu ataque via supply chain; 53% esperam que fique igual ou piore",
   "Os ataques através de terceiros estão em queda desde a entrada da NIS2",
   "Apenas as grandes empresas multinacionais são afetadas por este vetor"
  ],
  "c": 1,
  "exp": "E menos de metade dos profissionais confia na segurança da cadeia da própria organização — enquanto quase metade não tem práticas consistentes de teste aos terceiros. O risco está instalado; a resposta é o TPRM que começa na próxima sessão."
 },
 {
  "q": "No caso CrowdStrike (julho 2024), qual é a pergunta de GESTÃO mais importante que o incidente deixou?",
  "opts": [
   "Que fornecedor de segurança alternativo se deve contratar a seguir?",
   "Porque é que uma atualização chegou a 8,5 milhões de máquinas sem faseamento?",
   "Quanto custou, ao certo, o dia de paragem nas operações globais?",
   "Se a Microsoft deveria adquirir a CrowdStrike para evitar repetições?, como por vezes se assume erradamente"
  ],
  "c": 1,
  "exp": "Duas falhas espelhadas: no fornecedor (validação e staged rollout) e nos clientes (confiança cega, sem cenário 'o meu protetor falha'). O teu plano de continuidade cobre a falha do teu EDR? Essa pergunta vale o caso inteiro."
 }
];

let i = 0, certas = 0, respostas = [];
const $ = id => document.getElementById(id);

function render(){
  $('bar').style.width = (i / QUESTOES.length * 100) + '%';
  const Q = QUESTOES[i];
  let h = `<div class="qnum">Pergunta ${i+1} de ${QUESTOES.length}</div>`;
  h += `<div class="qtext">${Q.q}</div>`;
  Q.opts.forEach((o, k) => {
    h += `<button class="opt" onclick="responder(${k})"><span class="letra">${'abcd'[k]})</span>${o}</button>`;
  });
  h += `<div class="feedback" id="fb"></div>`;
  $('quiz').innerHTML = h;
  $('btnNext').classList.remove('show');
  $('btnNext').textContent = (i === QUESTOES.length - 1) ? 'Ver resultado →' : 'Próxima pergunta →';
}

function responder(k){
  const Q = QUESTOES[i];
  const botoes = document.querySelectorAll('.opt');
  botoes.forEach(b => b.disabled = true);
  botoes[Q.c].classList.add('correta');
  const ok = (k === Q.c);
  if(ok){ certas++; } else { botoes[k].classList.add('errada'); }
  respostas.push(ok);
  const fb = $('fb');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'ko');
  fb.innerHTML = `<b>${ok ? '✓ Correto!' : '✗ Não é essa.'}</b>${Q.exp}`;
  $('btnNext').classList.add('show');
}

function proxima(){
  i++;
  if(i < QUESTOES.length){ render(); }
  else { resultado(); }
}

function resultado(){
  $('bar').style.width = '100%';
  $('quiz').innerHTML = '';
  $('btnNext').classList.remove('show');
  const pct = Math.round(certas / QUESTOES.length * 100);
  $('scoreTxt').textContent = `${certas}/${QUESTOES.length}`;
  let nivel, msg;
  if(pct >= 90){ nivel = '🏆 Nível: pronto para o board'; msg = 'Excelente. Dominas as mensagens do Módulo 1 — na próxima sessão, desafia o formador.'; }
  else if(pct >= 70){ nivel = '👍 Nível: CISO em construção'; msg = 'Muito bom. Revê as explicações das perguntas falhadas — normalmente são as armadilhas entre "técnico" e "negócio".'; }
  else if(pct >= 50){ nivel = '📈 Nível: no bom caminho'; msg = 'Estás a meio da viagem. Sugestão: relê a cábula da matriz de McFarlan e a grelha das 6 perguntas da NIS2.'; }
  else { nivel = '🌱 Nível: ponto de partida'; msg = 'Sem stress — é exatamente para isto que serve a formação. Volta a este quiz no fim do módulo e compara.'; }
  $('nivelTxt').textContent = nivel;
  $('msgTxt').textContent = msg;
  let rev = '<h3>Revisão rápida</h3>';
  QUESTOES.forEach((Q, k) => {
    rev += `<div class="rev-item ${respostas[k] ? 'certa' : 'errada2'}" data-i="${k+1}.">${Q.q.substring(0, 90)}${Q.q.length > 90 ? '…' : ''}</div>`;
  });
  $('revisao').innerHTML = rev;
  $('res').classList.add('show');
}

function reiniciar(){
  i = 0; certas = 0; respostas = [];
  $('res').classList.remove('show');
  render();
}

render();
</script>
</body>
</html>
